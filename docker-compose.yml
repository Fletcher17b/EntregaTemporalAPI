services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appbackend
      POSTGRES_USER: appbackend
      POSTGRES_PASSWORD: appbackend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appbackend -d appbackend"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/appbackend
      SPRING_DATASOURCE_USERNAME: appbackend
      SPRING_DATASOURCE_PASSWORD: appbackend
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY:-dev-internal-api-key}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_PUBLIC_KEY_LOCATION: ${JWT_PUBLIC_KEY_LOCATION:-classpath:jwt-public.pem}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
