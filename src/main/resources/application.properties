spring.application.name=AppBackend

spring.datasource.url=jdbc:postgresql://localhost:5432/appbackend
spring.datasource.username=appbackend
spring.datasource.password=appbackend
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# Auth API (separate service — login/refresh/logout live there)
auth.api.base-url=${AUTH_API_URL:http://localhost:8081}
auth.api.internal-api-key=${AUTH_INTERNAL_API_KEY:dev-internal-api-key}

# JWT verification (Auth API signs with private key; this service verifies with public key)
auth.jwt.public-key=${JWT_PUBLIC_KEY:}
auth.jwt.public-key-location=${JWT_PUBLIC_KEY_LOCATION:classpath:jwt-public.pem}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
